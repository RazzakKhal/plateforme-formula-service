name: CI/CD - Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prod:
        description: 'Build prod image'
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
      IMAGE_NAME: razzak2007/plateforme-autoecole-formula-service
      PROD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prod || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout ask-bom
        uses: actions/checkout@v4
        with:
          repository: razzakkhal/ask-bom
          token: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
          path: ask-bom

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          mkdir -p .mvn
          cat <<'EOF' > ~/.m2/settings.xml
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>RazzakKhal</username>
                <password>${env.GITHUB_PACKAGES_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/razzakkhal/ask-bom</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/razzakkhal/ask-bom</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
          cp ~/.m2/settings.xml .mvn/settings.xml
      - name: Install ask-bom and common locally
        run: mvn -B -ntp -f ask-bom/pom.xml clean install -DskipTests

      - name: build and test and generate coverage
        run: mvn clean install

      - name: Compute image tag
        shell: bash
        run: |
          if [[ "${PROD}" == "true" ]]; then
            TAG=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
            if [[ "$TAG" == *-SNAPSHOT ]]; then
              echo "Refus de publier en prod une version SNAPSHOT: $TAG"
              exit 1
            fi
          else
            TAG=latest
          fi

          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Upload Jacoco Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: ./target/site/jacoco


      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          mvn compile jib:build \
            -Djib.to.image=${IMAGE_NAME}:${IMAGE_TAG}
